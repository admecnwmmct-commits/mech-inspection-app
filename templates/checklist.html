<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspection Checklist · BCT Mech Dept</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--navy-mid:#112040;--saffron:#f4a014;--white:#f8f9fc;--muted:#94a3b8;--border:rgba(255,255,255,0.08);--card:rgba(255,255,255,0.04);--green:#22c55e;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}
.topbar{position:sticky;top:0;z-index:100;background:var(--navy-mid);border-bottom:2px solid rgba(244,160,20,0.4);padding:0 16px;display:flex;align-items:center;gap:12px;height:56px;}
.topbar-brand{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;white-space:nowrap;}
.topbar-info{font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.progress-wrap{min-width:120px;}
.progress-label{font-size:10px;color:var(--saffron);margin-bottom:3px;}
.progress-bar-bg{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;}
.progress-bar-fill{height:4px;background:var(--saffron);border-radius:2px;transition:width .3s;width:0%;}
.topbar-score{font-size:12px;font-weight:600;white-space:nowrap;}
.tab-bar{background:var(--navy-mid);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{padding:9px 14px;font-size:12px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;font-family:'IBM Plex Sans',sans-serif;}
.tab-btn.active{color:var(--saffron);border-bottom-color:var(--saffron);}
.main{max-width:900px;margin:0 auto;padding:20px 16px 80px;}
.section-panel{display:none;}
.section-panel.active{display:block;}
.subsection{margin-bottom:24px;}
.sub-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--saffron);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:10px;}
.item-row{background:var(--card);border:1px solid var(--border);border-left:3px solid transparent;border-radius:10px;padding:12px 14px;margin-bottom:7px;}
.item-row.answered-yes{border-left-color:var(--green);}
.item-row.answered-no{border-left-color:var(--red);}
.item-label{font-size:13px;color:var(--white);margin-bottom:9px;line-height:1.4;}
.item-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.yn-btn{padding:5px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--muted);font-family:'IBM Plex Sans',sans-serif;}
.yn-btn.yes.active{background:rgba(34,197,94,0.15);border-color:var(--green);color:var(--green);}
.yn-btn.no.active{background:rgba(239,68,68,0.15);border-color:var(--red);color:var(--red);}
.remark-input{flex:1;min-width:140px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--white);font-size:12px;font-family:'IBM Plex Sans',sans-serif;outline:none;}
.remark-input::placeholder{color:var(--muted);}
.nav-footer{position:fixed;bottom:0;left:0;right:0;background:var(--navy-mid);border-top:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;z-index:100;}
.btn-nav{padding:9px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;border:none;}
.btn-prev{background:rgba(255,255,255,0.07);color:var(--white);border:1px solid var(--border);}
.btn-next{background:var(--saffron);color:var(--navy);}
.btn-submit{background:var(--green);color:#fff;}
.nav-step{font-size:11px;color:var(--muted);}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">Inspection Checklist</div>
  <div class="topbar-info" id="headerDisplay">Loading...</div>
  <div class="progress-wrap">
    <div class="progress-label" id="progressLabel">0% complete</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  </div>
  <div class="topbar-score">Yes: <span id="scoreYes">0</span> No: <span id="scoreNo">0</span></div>
</div>
<div class="tab-bar" id="tabBar"></div>
<div class="main" id="mainContent"><p style="color:var(--muted);padding:40px">Loading...</p></div>
<div class="nav-footer">
  <button class="btn-nav btn-prev" id="btnPrev" onclick="navigate(-1)">Previous</button>
  <div class="nav-step" id="navStep">Loading...</div>
  <button class="btn-nav btn-next" id="btnNext" onclick="navigate(1)">Next</button>
</div>
<script>
var SECTIONS=[];var currentSection=0;var responses={};var totalItems=0;
var header=JSON.parse(sessionStorage.getItem('header')||'{}');
document.getElementById('headerDisplay').textContent=(header.name||'Inspector')+' - '+(header.location||'')+' - '+(header.date||'');
fetch('/api/sections').then(function(r){return r.json();}).then(function(data){SECTIONS=data;buildUI();}).catch(function(){document.getElementById('mainContent').innerHTML='<p style="color:red;padding:40px">Error loading. Please go back.</p>';});
function buildUI(){
  var tabBar=document.getElementById('tabBar');
  var main=document.getElementById('mainContent');
  tabBar.innerHTML='';main.innerHTML='';totalItems=0;
  for(var si=0;si<SECTIONS.length;si++){
    var sec=SECTIONS[si];
    var tab=document.createElement('button');
    tab.className='tab-btn'+(si===0?' active':'');
    tab.textContent=sec.icon+' '+sec.title;
    tab.setAttribute('data-idx',si);
    (function(idx){tab.onclick=function(){goSection(idx);};})(si);
    tabBar.appendChild(tab);
    var panel=document.createElement('div');
    panel.className='section-panel'+(si===0?' active':'');
    panel.id='section_'+si;
    for(var bi=0;bi<sec.subsections.length;bi++){
      var sub=sec.subsections[bi];
      var subDiv=document.createElement('div');
      subDiv.className='subsection';
      var subTitle=document.createElement('div');
      subTitle.className='sub-title';
      subTitle.textContent=sub.title;
      subDiv.appendChild(subTitle);
      for(var ii=0;ii<sub.items.length;ii++){
        totalItems++;
        var item=sub.items[ii];
        var row=document.createElement('div');
        row.className='item-row';
        row.id='row_'+item.id;
        var lbl=document.createElement('div');
        lbl.className='item-label';
        lbl.textContent=item.label;
        row.appendChild(lbl);
        var ctrl=document.createElement('div');
        ctrl.className='item-controls';
        var yBtn=document.createElement('button');
        yBtn.className='yn-btn yes';yBtn.textContent='Yes';
        var nBtn=document.createElement('button');
        nBtn.className='yn-btn no';nBtn.textContent='No';
        (function(id,yb,nb,r){
          yb.onclick=function(){setAnswer(id,'yes',yb,nb,r);};
          nb.onclick=function(){setAnswer(id,'no',nb,yb,r);};
        })(item.id,yBtn,nBtn,row);
        var rmk=document.createElement('input');
        rmk.className='remark-input';rmk.type='text';rmk.placeholder='Remarks (optional)';
        (function(id,inp){inp.oninput=function(){setRemark(id,inp.value);};})(item.id,rmk);
        ctrl.appendChild(yBtn);ctrl.appendChild(nBtn);ctrl.appendChild(rmk);
        row.appendChild(ctrl);subDiv.appendChild(row);
      }
      panel.appendChild(subDiv);
    }
    main.appendChild(panel);
  }
  goSection(0);
}
function setAnswer(id,ans,ab,ob,row){
  if(!responses[id])responses[id]={};
  responses[id].answer=ans;
  ab.classList.add('active');ob.classList.remove('active');
  row.classList.remove('answered-yes','answered-no');
  row.classList.add(ans==='yes'?'answered-yes':'answered-no');
  updateProgress();
}
function setRemark(id,val){if(!responses[id])responses[id]={};responses[id].remark=val;}
function updateProgress(){
  var ans=Object.keys(responses).filter(function(k){return responses[k].answer;}).length;
  var pct=totalItems?Math.round(100*ans/totalItems):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=pct+'% complete';
  var y=Object.values(responses).filter(function(v){return v.answer==='yes';}).length;
  var n=Object.values(responses).filter(function(v){return v.answer==='no';}).length;
  document.getElementById('scoreYes').textContent=y;
  document.getElementById('scoreNo').textContent=n;
}
function goSection(idx){
  document.querySelectorAll('.section-panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  var p=document.getElementById('section_'+idx);if(p)p.classList.add('active');
  var tabs=document.querySelectorAll('.tab-btn');if(tabs[idx])tabs[idx].classList.add('active');
  currentSection=idx;
  document.getElementById('navStep').textContent='Section '+(idx+1)+' of '+SECTIONS.length;
  document.getElementById('btnPrev').style.visibility=idx===0?'hidden':'visible';
  var isLast=idx===SECTIONS.length-1;
  var btn=document.getElementById('btnNext');
  btn.textContent=isLast?'Submit and Generate Report':'Next';
  btn.className='btn-nav '+(isLast?'btn-submit':'btn-next');
  if(tabs[idx])tabs[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  window.scrollTo({top:0,behavior:'smooth'});
}
function navigate(dir){
  var next=currentSection+dir;
  if(next<0)return;
  if(next>=SECTIONS.length){submitChecklist();return;}
  goSection(next);
}
function submitChecklist(){
  var payload={header:header,responses:responses};
  fetch('/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .then(function(r){if(r.ok){window.location.href='/summary';}else{alert('Error. Please try again.');}})
  .catch(function(){alert('Network error. Please try again.');});
}
</script>
</body>
</html>
