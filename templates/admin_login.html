<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login · BCT Mech Inspection</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans',sans-serif;background:#0a1628;color:#f8f9fc;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;width:100%;max-width:380px;}
.title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px;}
.sub{font-size:12px;color:#94a3b8;margin-bottom:28px;}
label{display:block;font-size:11px;font-weight:600;color:#f4a014;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;}
input[type=password]{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:11px 14px;color:#f8f9fc;font-size:14px;font-family:'IBM Plex Sans',sans-serif;outline:none;margin-bottom:16px;}
input[type=password]:focus{border-color:rgba(244,160,20,0.5);}
.btn{width:100%;background:#f4a014;color:#0a1628;padding:12px;border-radius:8px;font-size:14px;font-weight:700;font-family:'Rajdhani',sans-serif;letter-spacing:.04em;border:none;cursor:pointer;}
.btn:hover{background:#fbbf45;}
.error{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:16px;}
.back{display:block;text-align:center;margin-top:16px;font-size:12px;color:#94a3b8;text-decoration:none;}
.back:hover{color:#f8f9fc;}
</style>
</head>
<body>
<div class="card">
  <div class="title">⚙️ Admin Panel</div>
  <div class="sub">BCT Mechanical Dept · Checklist Editor</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Admin Password</label>
    <input type="password" name="password" placeholder="Enter password" autofocus>
    <button type="submit" class="btn">Login →</button>
  </form>
  <a href="/" class="back">← Back to Inspection App</a>
</div>
</body>
</html>
